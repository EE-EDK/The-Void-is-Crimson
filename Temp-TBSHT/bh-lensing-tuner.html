<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Lensing — Shader Tuner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; color: #ccc; }
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }

#panel {
  position: fixed; top: 0; right: 0; width: 340px; height: 100vh;
  background: rgba(0,0,0,0.88); border-left: 1px solid #333;
  overflow-y: auto; z-index: 100; padding: 8px 10px;
  font-size: 11px;
}
#panel::-webkit-scrollbar { width: 6px; }
#panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

#panel h1 { color: #c84; font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
.group { margin-bottom: 10px; border: 1px solid #282828; border-radius: 3px; }
.group-header {
  background: #181818; padding: 5px 8px; cursor: pointer; font-size: 11px;
  color: #a86; font-weight: bold; user-select: none; display: flex;
  justify-content: space-between; align-items: center;
}
.group-header:hover { background: #222; }
.group-header .arrow { transition: transform 0.2s; }
.group-header.collapsed .arrow { transform: rotate(-90deg); }
.group-body { padding: 4px 8px 8px; }
.group-body.hidden { display: none; }

.ctrl { margin-bottom: 5px; }
.ctrl label { display: flex; justify-content: space-between; margin-bottom: 1px; color: #999; }
.ctrl label span.val { color: #6a6; font-weight: bold; }
.ctrl input[type=range] {
  width: 100%; height: 14px; -webkit-appearance: none; background: #222;
  border-radius: 2px; outline: none;
}
.ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 14px; background: #888;
  border-radius: 2px; cursor: pointer;
}
.ctrl input[type=range]::-webkit-slider-thumb:hover { background: #aaa; }

.btn-row { display: flex; gap: 4px; margin-bottom: 8px; }
.btn-row button {
  flex: 1; padding: 5px; background: #222; border: 1px solid #444;
  color: #ccc; cursor: pointer; font-family: monospace; font-size: 10px;
  border-radius: 2px;
}
.btn-row button:hover { background: #333; }

#toggle-panel {
  position: fixed; top: 8px; right: 8px; z-index: 200;
  background: rgba(0,0,0,0.7); border: 1px solid #555; color: #ccc;
  padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 11px;
  border-radius: 3px; display: none;
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<button id="toggle-panel" onclick="document.getElementById('panel').style.display='block';this.style.display='none';">Show Panel</button>

<div id="panel">
<h1>BLACK HOLE LENSING TUNER</h1>
<div class="btn-row">
  <button onclick="exportValues()">Copy Values</button>
  <button onclick="resetAll()">Reset All</button>
  <button onclick="document.getElementById('panel').style.display='none';document.getElementById('toggle-panel').style.display='block';">Hide Panel</button>
</div>
<div id="controls"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============================================================
// PARAMETER DEFINITIONS
// ============================================================
var PARAMS = {
  // --- CAMERA --- (defaults from user tuning session)
  cam_distance:       { group: 'Camera',           label: 'Distance',             min: 5, max: 40,   val: 34.5,  step: 0.5 },
  cam_inclination:    { group: 'Camera',           label: 'Inclination (deg)',    min: 5, max: 89,   val: 86.0,  step: 1 },
  cam_fov:            { group: 'Camera',           label: 'Field of View',        min: 20, max: 90,  val: 41.0,  step: 1 },

  // --- BLACK HOLE ---
  bh_mass:            { group: 'Black Hole',       label: 'Mass (Rs units)',      min: 0.3, max: 3,  val: 1.7,   step: 0.05 },
  bh_shadow_sharpness:{ group: 'Black Hole',       label: 'Shadow Sharpness',     min: 1, max: 60,   val: 38.0,  step: 1 },

  // --- ACCRETION DISK ---
  disk_inner:         { group: 'Accretion Disk',   label: 'Inner Radius (Rs)',    min: 1.5, max: 8,  val: 5.2,   step: 0.1 },
  disk_outer:         { group: 'Accretion Disk',   label: 'Outer Radius (Rs)',    min: 4, max: 25,   val: 12.5,  step: 0.5 },
  disk_brightness:    { group: 'Accretion Disk',   label: 'Brightness',           min: 0.5, max: 5,  val: 2.4,   step: 0.1 },
  disk_temp_inner:    { group: 'Accretion Disk',   label: 'Inner Temperature',    min: 0.5, max: 3,  val: 2.25,  step: 0.05 },
  disk_temp_falloff:  { group: 'Accretion Disk',   label: 'Temp Falloff Power',   min: 0.3, max: 2,  val: 0.4,   step: 0.05 },
  disk_noise_scale:   { group: 'Accretion Disk',   label: 'Noise Scale',          min: 1, max: 20,   val: 13.0,  step: 0.5 },
  disk_noise_strength:{ group: 'Accretion Disk',   label: 'Noise Strength',       min: 0, max: 1,    val: 0.68,  step: 0.02 },
  disk_rotation_speed:{ group: 'Accretion Disk',   label: 'Rotation Speed',       min: 0, max: 2,    val: 1.6,   step: 0.05 },

  // --- FRONT DISK (edge-on band hugging shadow) ---
  front_brightness:   { group: 'Front Disk',       label: 'Front Brightness',     min: 0, max: 5,    val: 2.5,   step: 0.1 },
  front_thickness:    { group: 'Front Disk',       label: 'Visual Thickness',     min: 0.001, max: 0.08, val: 0.012, step: 0.001 },
  front_glow:         { group: 'Front Disk',       label: 'Edge Glow Width',      min: 0.001, max: 0.1,  val: 0.03,  step: 0.001 },
  front_curve_amount: { group: 'Front Disk',       label: 'Hug Shadow Amount',    min: 0, max: 1,    val: 0.7,   step: 0.01 },
  front_curve_radius: { group: 'Front Disk',       label: 'Shadow Hug Radius (Rs)', min: 0.5, max: 3, val: 1.6,   step: 0.05 },

  // --- DOPPLER ---
  doppler_strength:   { group: 'Doppler Beaming',  label: 'Doppler Strength',     min: 0, max: 2,    val: 1.05,  step: 0.05 },
  doppler_boost:      { group: 'Doppler Beaming',  label: 'Beaming Exponent',     min: 1, max: 5,    val: 1.9,   step: 0.1 },

  // --- PHOTON RING ---
  ring_intensity:     { group: 'Photon Ring',      label: 'Intensity',            min: 0, max: 5,    val: 2.7,   step: 0.1 },
  ring_width:         { group: 'Photon Ring',      label: 'Width',                min: 0.01, max: 0.5, val: 0.19, step: 0.005 },

  // --- LENSING ---
  lens_strength:      { group: 'Gravitational Lensing', label: 'Bend Strength',   min: 0.5, max: 4,  val: 1.1,   step: 0.05 },
  lens_secondary:     { group: 'Gravitational Lensing', label: 'Secondary Image',  min: 0, max: 2,   val: 0.7,   step: 0.05 },

  // --- COLORS ---
  color_hot_r:        { group: 'Color Palette',    label: 'Hot Color R',          min: 0, max: 1,    val: 1.0,   step: 0.01 },
  color_hot_g:        { group: 'Color Palette',    label: 'Hot Color G',          min: 0, max: 1,    val: 0.85,  step: 0.01 },
  color_hot_b:        { group: 'Color Palette',    label: 'Hot Color B',          min: 0, max: 1,    val: 0.5,   step: 0.01 },
  color_warm_r:       { group: 'Color Palette',    label: 'Warm Color R',         min: 0, max: 1,    val: 1.0,   step: 0.01 },
  color_warm_g:       { group: 'Color Palette',    label: 'Warm Color G',         min: 0, max: 1,    val: 0.5,   step: 0.01 },
  color_warm_b:       { group: 'Color Palette',    label: 'Warm Color B',         min: 0, max: 1,    val: 0.05,  step: 0.01 },
  color_cool_r:       { group: 'Color Palette',    label: 'Cool Color R',         min: 0, max: 1,    val: 0.6,   step: 0.01 },
  color_cool_g:       { group: 'Color Palette',    label: 'Cool Color G',         min: 0, max: 1,    val: 0.15,  step: 0.01 },
  color_cool_b:       { group: 'Color Palette',    label: 'Cool Color B',         min: 0, max: 1,    val: 0.02,  step: 0.01 },

  // --- STARFIELD ---
  stars_brightness:   { group: 'Starfield',        label: 'Brightness',           min: 0, max: 5,    val: 3.0,   step: 0.05 },
  stars_density:      { group: 'Starfield',        label: 'Density',              min: 10, max: 300, val: 200.0, step: 5 },
  stars_warp:         { group: 'Starfield',        label: 'Lensing Warp',         min: 0, max: 2,    val: 1.15,  step: 0.05 },

  // --- POST-PROCESSING ---
  bloom_strength:     { group: 'Post-Processing',  label: 'Bloom / Glow',         min: 0, max: 3,    val: 1.55,  step: 0.05 },
  vignette_strength:  { group: 'Post-Processing',  label: 'Vignette',             min: 0, max: 2,    val: 0.2,   step: 0.05 },
  overall_brightness: { group: 'Post-Processing',  label: 'Overall Brightness',   min: 0.2, max: 3,  val: 1.0,   step: 0.05 },
  grain_intensity:    { group: 'Post-Processing',  label: 'Film Grain',           min: 0, max: 0.1,  val: 0.015, step: 0.005 },
};

var DEFAULTS = {};
Object.keys(PARAMS).forEach(function(k) { DEFAULTS[k] = PARAMS[k].val; });

// ============================================================
// BUILD UI
// ============================================================
function buildUI() {
  var container = document.getElementById('controls');
  var groups = {};
  Object.keys(PARAMS).forEach(function(key) {
    var p = PARAMS[key];
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push({ key: key, param: p });
  });

  Object.keys(groups).forEach(function(groupName) {
    var div = document.createElement('div');
    div.className = 'group';
    var header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = '<span>' + groupName + '</span><span class="arrow">▼</span>';
    header.onclick = function() { toggleGroup(this); };
    div.appendChild(header);

    var body = document.createElement('div');
    body.className = 'group-body';
    groups[groupName].forEach(function(item) {
      var ctrl = document.createElement('div');
      ctrl.className = 'ctrl';
      ctrl.innerHTML =
        '<label><span>' + item.param.label + '</span><span class="val" id="val-' + item.key + '">' + item.param.val + '</span></label>' +
        '<input type="range" id="slider-' + item.key + '" min="' + item.param.min + '" max="' + item.param.max + '" step="' + item.param.step + '" value="' + item.param.val + '" oninput="updateParam(\'' + item.key + '\', this.value)">';
      body.appendChild(ctrl);
    });
    div.appendChild(body);
    container.appendChild(div);
  });
}

function toggleGroup(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('hidden');
}

function updateParam(key, value) {
  PARAMS[key].val = parseFloat(value);
  document.getElementById('val-' + key).textContent = parseFloat(value).toFixed(3);
  syncUniforms();
}

function resetAll() {
  Object.keys(DEFAULTS).forEach(function(k) {
    PARAMS[k].val = DEFAULTS[k];
    var slider = document.getElementById('slider-' + k);
    if (slider) slider.value = DEFAULTS[k];
    var valEl = document.getElementById('val-' + k);
    if (valEl) valEl.textContent = DEFAULTS[k].toFixed(3);
  });
  syncUniforms();
}

function exportValues() {
  var lines = ['// Black Hole Lensing Tuner Export — ' + new Date().toISOString()];
  Object.keys(PARAMS).forEach(function(k) {
    if (PARAMS[k].val !== DEFAULTS[k]) {
      lines.push(k + ': ' + PARAMS[k].val.toFixed(4) + '  // default: ' + DEFAULTS[k]);
    }
  });
  if (lines.length === 1) lines.push('// No values changed from defaults');
  navigator.clipboard.writeText(lines.join('\n')).then(function() {
    alert('Copied ' + (lines.length - 1) + ' changed values to clipboard');
  });
}

function P(key) { return PARAMS[key].val; }

// ============================================================
// THREE.JS + SHADER — Schwarzschild-approximation ray tracing
// ============================================================
var shaderUniforms = null;

function initThree() {
  var canvas = document.getElementById('bg-canvas');
  var scene = new THREE.Scene();
  var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: false, antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  var clock = new THREE.Clock();

  shaderUniforms = {
    u_time: { value: 0 },
    u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    u_cam_distance: { value: P('cam_distance') },
    u_cam_inclination: { value: P('cam_inclination') },
    u_cam_fov: { value: P('cam_fov') },
    u_bh_mass: { value: P('bh_mass') },
    u_bh_shadow_sharpness: { value: P('bh_shadow_sharpness') },
    u_disk_inner: { value: P('disk_inner') },
    u_disk_outer: { value: P('disk_outer') },
    u_disk_brightness: { value: P('disk_brightness') },
    u_disk_temp_inner: { value: P('disk_temp_inner') },
    u_disk_temp_falloff: { value: P('disk_temp_falloff') },
    u_disk_noise_scale: { value: P('disk_noise_scale') },
    u_disk_noise_strength: { value: P('disk_noise_strength') },
    u_disk_rotation_speed: { value: P('disk_rotation_speed') },
    u_front_brightness: { value: P('front_brightness') },
    u_front_thickness: { value: P('front_thickness') },
    u_front_glow: { value: P('front_glow') },
    u_front_curve_amount: { value: P('front_curve_amount') },
    u_front_curve_radius: { value: P('front_curve_radius') },
    u_doppler_strength: { value: P('doppler_strength') },
    u_doppler_boost: { value: P('doppler_boost') },
    u_ring_intensity: { value: P('ring_intensity') },
    u_ring_width: { value: P('ring_width') },
    u_lens_strength: { value: P('lens_strength') },
    u_lens_secondary: { value: P('lens_secondary') },
    u_color_hot: { value: new THREE.Vector3(P('color_hot_r'), P('color_hot_g'), P('color_hot_b')) },
    u_color_warm: { value: new THREE.Vector3(P('color_warm_r'), P('color_warm_g'), P('color_warm_b')) },
    u_color_cool: { value: new THREE.Vector3(P('color_cool_r'), P('color_cool_g'), P('color_cool_b')) },
    u_stars_brightness: { value: P('stars_brightness') },
    u_stars_density: { value: P('stars_density') },
    u_stars_warp: { value: P('stars_warp') },
    u_bloom_strength: { value: P('bloom_strength') },
    u_vignette_strength: { value: P('vignette_strength') },
    u_overall_brightness: { value: P('overall_brightness') },
    u_grain_intensity: { value: P('grain_intensity') },
  };

  var vertexShader = [
    'varying vec2 vUv;',
    'void main() {',
    '  vUv = uv;',
    '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
    '}'
  ].join('\n');

  // ----------------------------------------------------------------
  // Fragment shader: Schwarzschild black hole ray-tracing
  // Produces edge-on accretion disk with gravitational lensing
  // (the classic Interstellar / NASA visualization look)
  // ----------------------------------------------------------------
  var fragmentShader = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_resolution;',
    '',
    'uniform float u_cam_distance, u_cam_inclination, u_cam_fov;',
    'uniform float u_bh_mass, u_bh_shadow_sharpness;',
    'uniform float u_disk_inner, u_disk_outer;',
    'uniform float u_disk_brightness, u_disk_temp_inner, u_disk_temp_falloff;',
    'uniform float u_disk_noise_scale, u_disk_noise_strength, u_disk_rotation_speed;',
    'uniform float u_front_brightness, u_front_thickness, u_front_glow;',
    'uniform float u_front_curve_amount, u_front_curve_radius;',
    'uniform float u_doppler_strength, u_doppler_boost;',
    'uniform float u_ring_intensity, u_ring_width;',
    'uniform float u_lens_strength, u_lens_secondary;',
    'uniform vec3 u_color_hot, u_color_warm, u_color_cool;',
    'uniform float u_stars_brightness, u_stars_density, u_stars_warp;',
    'uniform float u_bloom_strength, u_vignette_strength, u_overall_brightness, u_grain_intensity;',
    '',
    'varying vec2 vUv;',
    '',
    '#define PI 3.14159265359',
    '#define MAX_STEPS 200',
    '',
    '// ---- Noise functions ----',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);',
    '}',
    'float hash3(vec3 p) {',
    '  return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453);',
    '}',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p), f = fract(p);',
    '  vec2 u = f * f * (3.0 - 2.0 * f);',
    '  return mix(mix(hash(i), hash(i + vec2(1,0)), u.x),',
    '             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x), u.y);',
    '}',
    'float fbm(vec2 p) {',
    '  float v = 0.0, a = 0.5;',
    '  for (int i = 0; i < 4; i++) {',
    '    v += a * noise(p);',
    '    p = p * 2.03 + vec2(1.7, 9.2);',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ---- Disk color from temperature profile ----',
    'vec3 diskColor(float r, float phi) {',
    '  float norm = clamp((r - u_disk_inner) / (u_disk_outer - u_disk_inner), 0.0, 1.0);',
    '  float temp = (1.0 - pow(norm, u_disk_temp_falloff)) * u_disk_temp_inner;',
    '  temp = clamp(temp, 0.0, 1.0);',
    '  vec3 col = temp < 0.5',
    '    ? mix(u_color_cool, u_color_warm, temp * 2.0)',
    '    : mix(u_color_warm, u_color_hot, (temp - 0.5) * 2.0);',
    '',
    '  // Spiral arm / filament structure',
    '  float n1 = fbm(vec2(phi * u_disk_noise_scale / (2.0*PI) + u_time * u_disk_rotation_speed, r * 0.6));',
    '  float n2 = fbm(vec2(phi * u_disk_noise_scale * 0.4 / (2.0*PI) - u_time * u_disk_rotation_speed * 0.5, r * 1.2 + u_time * 0.03));',
    '  float structure = (0.55 + 0.45 * n1) * (0.65 + 0.35 * n2);',
    '  col *= mix(1.0, structure, u_disk_noise_strength);',
    '',
    '  // 1/r brightness falloff',
    '  col *= 0.25 + 0.75 * (u_disk_inner / max(r, u_disk_inner));',
    '  return col;',
    '}',
    '',
    '// ---- Starfield ----',
    'vec3 starfield(vec3 rd) {',
    '  vec3 col = vec3(0.0);',
    '  for (int layer = 0; layer < 3; layer++) {',
    '    float sc = u_stars_density * (1.0 + float(layer) * 0.8);',
    '    vec3 grid = floor(rd * sc);',
    '    vec3 f = fract(rd * sc) - 0.5;',
    '    float seed = hash3(grid + float(layer) * 137.0);',
    '    float bright = pow(seed, 18.0 + float(layer) * 12.0);',
    '    vec3 off = vec3(hash3(grid+0.1), hash3(grid+0.2), hash3(grid+0.3)) - 0.5;',
    '    float d = length(f - off * 0.4);',
    '    float s = smoothstep(0.07, 0.005, d) * bright;',
    '    float tw = 0.75 + 0.25 * sin(u_time * (1.0 + seed * 3.0) + seed * 6.28);',
    '    vec3 tint = mix(vec3(0.7,0.8,1.0), vec3(1.0,0.9,0.7), seed);',
    '    col += tint * s * tw;',
    '  }',
    '  return col * u_stars_brightness;',
    '}',
    '',
    '// ---- Main ----',
    'void main() {',
    '  vec2 st = gl_FragCoord.xy / u_resolution;',
    '  vec2 uv = st * 2.0 - 1.0;',
    '  uv.x *= u_resolution.x / u_resolution.y;',
    '',
    '  // Camera (spherical coords, looking at origin)',
    '  float inc = u_cam_inclination * PI / 180.0;',
    '  float fov = tan(u_cam_fov * PI / 360.0);',
    '  vec3 camPos = vec3(0.0, u_cam_distance * cos(inc), u_cam_distance * sin(inc));',
    '  vec3 fwd = normalize(-camPos);',
    '  vec3 right = normalize(cross(fwd, vec3(0,1,0)));',
    '  vec3 up = cross(right, fwd);',
    '  vec3 rd = normalize(fwd + uv.x * fov * right + uv.y * fov * up);',
    '',
    '  // Ray integration through curved spacetime',
    '  float Rs = 2.0 * u_bh_mass;',
    '  vec3 pos = camPos;',
    '  vec3 vel = rd;',
    '  vec3 col = vec3(0.0);',
    '  vec3 diskAccum = vec3(0.0);',
    '  float closestR = 100.0;',
    '  bool absorbed = false;',
    '  int diskHits = 0;',
    '',
    '  float baseStep = 0.2;',
    '',
    '  for (int i = 0; i < MAX_STEPS; i++) {',
    '    float r = length(pos);',
    '    if (r < closestR) closestR = r;',
    '',
    '    // Gravitational acceleration (GR-corrected Newtonian)',
    '    vec3 toCenter = -pos / r;',
    '    float accel = u_lens_strength * Rs / (r * r);',
    '    vel += toCenter * accel * baseStep;',
    '    vel = normalize(vel);',
    '',
    '    // Adaptive step: small near BH, large far away',
    '    float h = baseStep * clamp(r * 0.15, 0.02, 1.5);',
    '    vec3 newPos = pos + vel * h;',
    '',
    '    // ---- Disk intersection: y=0 plane ----',
    '    if (pos.y * newPos.y < 0.0) {',
    '      float tHit = abs(pos.y) / max(abs(pos.y - newPos.y), 1e-6);',
    '      vec3 hitP = mix(pos, newPos, tHit);',
    '      float hitR = length(hitP.xz);',
    '      float hitPhi = atan(hitP.z, hitP.x) + PI;',
    '',
    '      if (hitR > u_disk_inner * u_bh_mass && hitR < u_disk_outer * u_bh_mass && hitR > Rs) {',
    '        float innerFade = smoothstep(u_disk_inner * u_bh_mass, u_disk_inner * u_bh_mass + 0.4, hitR);',
    '        float outerFade = smoothstep(u_disk_outer * u_bh_mass, u_disk_outer * u_bh_mass - 2.0, hitR);',
    '        float alpha = innerFade * outerFade;',
    '',
    '        vec3 dCol = diskColor(hitR / u_bh_mass, hitPhi) * u_disk_brightness * alpha;',
    '',
    '        // Doppler beaming',
    '        vec3 tangent = normalize(vec3(-hitP.z, 0.0, hitP.x));',
    '        float vOrb = sqrt(u_bh_mass / hitR) * 0.5;',
    '        float doppler = 1.0 + u_doppler_strength * dot(vel, tangent) * vOrb;',
    '        doppler = pow(max(doppler, 0.05), u_doppler_boost);',
    '        dCol *= doppler;',
    '',
    '        // Secondary images are dimmer',
    '        float weight = diskHits > 0 ? u_lens_secondary : 1.0;',
    '        diskAccum += dCol * weight;',
    '        diskHits++;',
    '      }',
    '    }',
    '',
    '    // Event horizon absorption',
    '    if (r < Rs * 0.7) { absorbed = true; break; }',
    '    // Escape',
    '    if (r > 60.0) break;',
    '',
    '    pos = newPos;',
    '  }',
    '',
    '  // Background: warped starfield',
    '  if (!absorbed) {',
    '    col = mix(starfield(rd) * 0.3, starfield(vel), u_stars_warp);',
    '  }',
    '',
    '  // Add ray-traced disk (lensed arcs above/below)',
    '  col += diskAccum;',
    '',
    '  // Photon ring glow (appears at ~1.5 Rs for Schwarzschild)',
    '  float photonR = 1.5 * Rs;',
    '  float ringDist = abs(closestR - photonR);',
    '  float ringGlow = exp(-ringDist * ringDist / (u_ring_width * u_ring_width * Rs * Rs));',
    '  vec3 ringCol = mix(u_color_warm, u_color_hot, ringGlow * 0.8);',
    '  float ringMult = u_ring_intensity * ringGlow;',
    '  ringMult *= diskHits > 0 ? 0.25 : 1.0;',
    '  col += ringCol * ringMult;',
    '',
    '  // Ensure event horizon is black (behind the front disk)',
    '  if (absorbed) col = vec3(0.0);',
    '',
    '  // ===== FRONT DISK: hugs the shadow boundary =====',
    '  // The near-side accretion disk passes in front of the shadow.',
    '  // Instead of a flat horizontal line, it curves around the shadow circle.',
    '  {',
    '    float diskIW = u_disk_inner * Rs;',
    '    float diskOW = u_disk_outer * Rs;',
    '    float screenDist = length(uv);',
    '',
    '    // Disk midplane: flat at y=diskMidY far from shadow,',
    '    // curves to follow shadow circle near the center',
    '    float diskMidY = -camPos.y / (u_cam_distance * fov);',
    '',
    '    // Shadow boundary in screen space',
    '    float shadowScreenR = u_front_curve_radius * Rs / (fov * u_cam_distance);',
    '',
    '    // Flat y-distance from disc midplane',
    '    float flatYDist = abs(uv.y - diskMidY);',
    '',
    '    // Curved y-distance: how far the pixel is from the shadow circle boundary',
    '    // When inside the shadow radius, the band follows the circle',
    '    float curvedYDist = abs(screenDist - shadowScreenR);',
    '',
    '    // Blend: use flat far from center, curved near the shadow',
    '    float nearShadow = smoothstep(shadowScreenR * 2.5, shadowScreenR * 0.5, abs(uv.x));',
    '    float yDist = mix(flatYDist, curvedYDist, nearShadow * u_front_curve_amount);',
    '',
    '    // Map screen-x to approximate world radius in the disk plane',
    '    float projR = abs(uv.x) * fov * u_cam_distance;',
    '    // Inside shadow region, use screen distance instead',
    '    projR = mix(projR, screenDist * fov * u_cam_distance, nearShadow * u_front_curve_amount);',
    '',
    '    // Band vertical profile: opaque core + soft glow edges',
    '    float thick = u_front_thickness;',
    '    float glow = u_front_glow;',
    '    float flare = 1.0 + 0.5 * clamp((projR - diskIW) / max(diskOW - diskIW, 0.1), 0.0, 1.0);',
    '    thick *= flare;',
    '    glow *= flare;',
    '',
    '    float bandCore = smoothstep(thick, thick * 0.2, yDist);',
    '    float bandGlow = smoothstep(thick + glow, thick * 0.5, yDist);',
    '    float bandAlpha = mix(bandGlow * 0.6, 1.0, bandCore);',
    '',
    '    // Radial fade: smooth at outer edge',
    '    float outerFade = smoothstep(diskOW, diskOW * 0.7, projR);',
    '',
    '    // Inside shadow: hot inner-disk material',
    '    float insideShadow = smoothstep(diskIW, diskIW * 0.6, projR);',
    '',
    '    // Color from temperature gradient',
    '    float colorRadius = mix(projR / Rs, u_disk_inner, insideShadow);',
    '    colorRadius = max(colorRadius, u_disk_inner * 0.8);',
    '    float phi = uv.x * 3.0 + u_time * u_disk_rotation_speed * 2.0 + PI;',
    '    vec3 bandCol = diskColor(colorRadius, phi) * u_front_brightness;',
    '',
    '    // Extra brightness at the photon sphere',
    '    float photonBoost = exp(-pow((projR - 1.5 * Rs) / (Rs * 0.5), 2.0)) * 1.5;',
    '    bandCol *= 1.0 + photonBoost * insideShadow;',
    '',
    '    // Doppler beaming across the band',
    '    float dopplerShift = 1.0 + u_doppler_strength * 0.3 * (uv.x / max(abs(uv.x), 0.01));',
    '    dopplerShift = pow(max(dopplerShift, 0.1), u_doppler_boost * 0.3);',
    '    bandCol *= dopplerShift;',
    '',
    '    // Composite: front disk over everything',
    '    float finalAlpha = bandAlpha * outerFade;',
    '    col = mix(col, bandCol, finalAlpha);',
    '  }',
    '',
    '  // ---- Post-processing ----',
    '  // Bloom (brighten bright areas)',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  col += col * max(lum - 0.6, 0.0) * u_bloom_strength;',
    '',
    '  // Vignette',
    '  float vig = length(st - 0.5) * 1.4;',
    '  col *= 1.0 - u_vignette_strength * vig * vig;',
    '',
    '  // Grain',
    '  col += (hash(uv * 400.0 + u_time) - 0.5) * u_grain_intensity;',
    '',
    '  // Brightness',
    '  col *= u_overall_brightness;',
    '',
    '  // ACES tonemap',
    '  col = clamp(col, 0.0, 10.0);',
    '  col = (col * (2.51 * col + 0.03)) / (col * (2.43 * col + 0.59) + 0.14);',
    '',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}'
  ].join('\n');

  var geometry = new THREE.PlaneGeometry(2, 2);
  var material = new THREE.ShaderMaterial({
    uniforms: shaderUniforms,
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
    depthWrite: false, depthTest: false
  });
  scene.add(new THREE.Mesh(geometry, material));

  window.addEventListener('resize', function() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    shaderUniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    shaderUniforms.u_time.value = clock.getElapsedTime() * 0.3;
    renderer.render(scene, camera);
  }
  animate();
  console.log('Black hole lensing shader initialized.');
}

function syncUniforms() {
  if (!shaderUniforms) return;
  Object.keys(PARAMS).forEach(function(key) {
    var uName = 'u_' + key;
    if (shaderUniforms[uName] && typeof shaderUniforms[uName].value === 'number') {
      shaderUniforms[uName].value = PARAMS[key].val;
    }
  });
  // Vector uniforms
  if (shaderUniforms.u_color_hot) {
    shaderUniforms.u_color_hot.value.set(P('color_hot_r'), P('color_hot_g'), P('color_hot_b'));
    shaderUniforms.u_color_warm.value.set(P('color_warm_r'), P('color_warm_g'), P('color_warm_b'));
    shaderUniforms.u_color_cool.value.set(P('color_cool_r'), P('color_cool_g'), P('color_cool_b'));
  }
}

// ============================================================
// BOOT
// ============================================================
buildUI();
initThree();
</script>
</body>
</html>
